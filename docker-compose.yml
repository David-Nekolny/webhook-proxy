services:
  webhook-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: webhook-proxy:latest
    container_name: webhook-proxy
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - webhook-net

networks:
  webhook-net:
    driver: bridge
